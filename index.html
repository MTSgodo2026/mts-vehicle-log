<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>MTS Vehicle Log v1.5</title>
<style>
body{margin:0;background:#f4f4f5;color:#18181b;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}*{box-sizing:border-box}button,input,textarea,select{font:inherit}.app{max-width:560px;margin:auto;padding:16px 16px 100px}.hero{background:linear-gradient(135deg,#09090b,#3f3f46);color:white;border-radius:28px;padding:22px}.hero p{color:#d4d4d8}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stats div{background:rgba(255,255,255,.1);border-radius:16px;text-align:center;padding:10px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}.tile,.card{background:white;border:0;border-radius:24px;padding:16px;margin:12px 0;box-shadow:0 4px 18px rgba(0,0,0,.05)}.tile{text-align:left}.muted{font-size:12px;color:#71717a;line-height:1.7}.pill{display:inline-block;background:#f4f4f5;color:#52525b;border-radius:999px;padding:5px 10px;font-size:11px;margin:3px}.ok{background:#dcfce7;color:#166534}.warn{background:#fef3c7;color:#92400e}.field label{display:block;font-size:12px;color:#52525b;font-weight:700;margin:10px 0 5px}input,textarea,select{width:100%;border:1px solid #ddd;border-radius:14px;padding:12px;background:white}textarea{min-height:100px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.primary{border:0;background:#18181b;color:white;border-radius:18px;padding:14px;font-weight:700}.secondary{border:1px solid #d4d4d8;background:white;border-radius:18px;padding:12px}.danger{border:0;background:#fee2e2;color:#991b1b;border-radius:18px;padding:12px}.actions{display:grid;gap:10px}.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);padding:10px;display:grid;grid-template-columns:repeat(6,1fr);gap:5px}.nav button{padding:9px 2px;border-radius:16px;border:0;background:transparent;color:#71717a;font-size:11px}.nav button.active{background:#18181b;color:white}.upload{border:2px dashed #d4d4d8;background:#fafafa;border-radius:22px;padding:16px;text-align:center}.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.thumb img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px}.notice{background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe;border-radius:18px;padding:12px;font-size:12px;line-height:1.7;white-space:pre-wrap}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #eee;padding:8px;font-size:12px;text-align:left}.manual li{margin:6px 0;font-size:13px;line-height:1.7}.print-title{display:none}@media print{.nav,.no-print,.hero{display:none}.app{max-width:none;padding:0}.card{box-shadow:none;border:1px solid #ccc;border-radius:0}.print-title{display:block}}
</style></head><body><div id="app"></div><script>
const CK='mts_vehicle_log_config_gas_v15',DK='mts_vehicle_log_v1';
let config=JSON.parse(localStorage.getItem(CK)||'{"gasUrl":""}');
let state=JSON.parse(localStorage.getItem(DK)||'{"events":[],"vehicles":[{"name":"TVR Sagaris","owner":"個人所有","plan":"MTSへ所有権移転予定","contract":"使用貸借契約あり"}],"drive":{"lastSync":""}}');
let current='home';const mt={venue:'会場写真',vehicle:'車両写真',receipt:'領収書',sns:'SNSスクショ',card:'名刺・交流',other:'その他'};
function save(){localStorage.setItem(DK,JSON.stringify(state))}function saveCfg(){localStorage.setItem(CK,JSON.stringify(config))}
function yen(n){return'¥'+Number(n||0).toLocaleString()}function today(){return new Date().toISOString().slice(0,10)}function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function nl(s){return esc(s||'').replaceAll('\n','<br>')}function byId(x){return document.getElementById(x)}
function msg(t){let e=byId('statusMsg'); if(e)e.innerHTML='<div class="notice">'+esc(t)+'</div>';else alert(t)}function syncMsg(t){let e=byId('syncStatusBox'); if(e)e.innerHTML='<div class="notice">'+esc(t)+'</div>';else alert(t)}
function app(h){document.getElementById('app').innerHTML='<main class="app">'+h+'</main>'+nav()}
function nav(){return`<div class="nav no-print">${[['new','計画'],['record','記録'],['report','報告'],['vault','保管'],['sync','同期'],['manual','説明']].map(([v,l])=>`<button class="${current===v?'active':''}" onclick="render('${v}')">${l}</button>`).join('')}</div>`}
function render(v='home'){current=v;if(v==='home')home();if(v==='new')newEvent();if(v==='record')record();if(v==='report')report();if(v==='vault')vault();if(v==='sync')syncView();if(v==='manual')manual();if(v.startsWith('detail:'))detail(v.split(':')[1])}
function totals(){return{exp:state.events.reduce((s,e)=>s+(e.expenses||[]).reduce((a,x)=>a+Number(x.amount||0),0),0),media:state.events.reduce((s,e)=>s+(e.photos||[]).length,0)}}
function home(){let t=totals();app(`<section class="hero"><h1>MTS Vehicle Log v1.5</h1><p>イベント別フォルダ保存＋簡易マニュアル</p><div class="stats"><div><b>${state.events.length}</b><br><span>記録数</span></div><div><b>${t.media}</b><br><span>写真</span></div><div><b>${yen(t.exp)}</b><br><span>経費候補</span></div></div><p class="muted" style="color:#ddd">GAS：${config.gasUrl?'設定済':'未設定'} / 最終同期：${esc(state.drive.lastSync||'未同期')}</p></section><section class="grid no-print"><button class="tile" onclick="render('new')"><b>＋ 新規イベント</b><small>参加計画を作成</small></button><button class="tile" onclick="render('record')"><b>📷 当日記録</b><small>写真・領収書・経費</small></button><button class="tile" onclick="render('report')"><b>✓ 完了・報告</b><small>PDF/CSV/GAS保存</small></button><button class="tile" onclick="render('manual')"><b>？ 使い方</b><small>簡易マニュアル</small></button></section>${state.events.length?state.events.slice().reverse().map(e=>`<div class="card" onclick="render('detail:${e.id}')"><b>${esc(e.title)}</b><br><span class="muted">${esc(e.date)} / ${esc(e.vehicle)} / ${esc(e.status||'計画')}</span><br>${e.driveId?'<span class="pill ok">GAS保存済</span>':'<span class="pill warn">未同期</span>'}</div>`).join(''):'<div class="card muted">まだ記録がありません。</div>'}`)}
function newEvent(){app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><div class="card"><h2>新規イベント</h2><div class="field"><label>イベント名</label><input id="title"></div><div class="row"><div class="field"><label>日付</label><input id="date" type="date" value="${today()}"></div><div class="field"><label>使用車両</label><input id="vehicle" placeholder="TVR Sagaris"></div></div><div class="field"><label>場所</label><input id="place"></div><div class="field"><label>目的</label><input id="purpose" placeholder="SNS広報、撮影、交流"></div><div class="field"><label>目的・予定メモ</label><textarea id="plan"></textarea></div><button class="primary" onclick="saveNew()">保存</button></div>`)}
async function saveNew(){let e={id:id(),title:byId('title').value,date:byId('date').value,vehicle:byId('vehicle').value,place:byId('place').value,purpose:byId('purpose').value,status:'計画',plan:byId('plan').value,memo:'',result:'',contacts:'',sns:'',expenses:[],photos:[],createdAt:new Date().toISOString()};state.events.push(e);save();if(config.gasUrl)await syncEvent(e).catch(console.error);detail(e.id)}
function pick(){return state.events.map(e=>`<option value="${e.id}">${esc(e.date)} / ${esc(e.title)}</option>`).join('')}
function record(){app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><div class="card"><h2>当日記録</h2><div id="statusMsg"></div>${state.events.length?`<div class="field"><label>対象イベント</label><select id="eid">${pick()}</select></div><div class="field"><label>写真分類</label><select id="mediaType">${Object.keys(mt).map(k=>`<option value="${k}">${mt[k]}</option>`).join('')}</select></div><div class="upload"><b>写真・領収書・SNSスクショ</b><p class="muted">分類を選んでから写真を追加してください。</p><input id="photos" type="file" accept="image/*" multiple></div><div class="field"><label>当日メモ</label><textarea id="memo"></textarea></div><div class="row"><div class="field"><label>費目</label><input id="ename" placeholder="高速代"></div><div class="field"><label>金額</label><input id="amount" type="number"></div></div><button class="secondary" onclick="addExpense()">経費追加</button><button class="primary" onclick="saveRecord()">記録保存・GAS同期</button>`:'先にイベントを作成してください。'}</div>`)}
function addExpense(){let e=find(byId('eid').value),a=Number(byId('amount').value||0);if(a>0){e.expenses.push({name:byId('ename').value||'経費',amount:a,date:today()});e.status='記録中';save();msg('経費を追加しました')}else msg('金額を入力してください')}
function fileData(f){return new Promise(r=>{let fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(f)})}
async function saveRecord(){try{msg('保存中です...');let e=find(byId('eid').value);e.memo=byId('memo').value;e.status='記録中';let m=byId('mediaType').value||'other';for(const f of Array.from((byId('photos')||{}).files||[])){let data=await fileData(f),item={name:f.name,type:f.type,data,mediaType:m,addedAt:new Date().toISOString()};if(config.gasUrl){let up=await uploadData(data,`${e.date}_${e.title}_${f.name}`,m,e).catch(err=>{console.error(err);return null});if(up)item.driveId=up.fileId}e.photos.push(item)}save();if(config.gasUrl)await syncEvent(e).catch(err=>msg('ローカル保存済。GAS同期失敗：'+err.message));msg('保存しました');setTimeout(()=>detail(e.id),500)}catch(err){msg('保存エラー：'+err.message)}}
function report(){app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><div class="card"><h2>完了・報告</h2>${state.events.length?`<div class="field"><label>対象イベント</label><select id="eid">${pick()}</select></div><div class="field"><label>得られた内容・業務への活用</label><textarea id="result"></textarea></div><div class="field"><label>交流先</label><input id="contacts"></div><div class="field"><label>SNS URL</label><input id="sns"></div><div class="actions"><button class="primary" onclick="saveReport()">報告保存・GAS同期</button><button class="secondary" onclick="printReport()">PDF出力</button><button class="secondary" onclick="csv(true)">CSV出力・GAS保存</button></div>`:'先にイベントを作成してください。'}</div>`);if(state.events.length){byId('eid').onchange=fillReport;fillReport()}}
function fillReport(){let e=find(byId('eid').value);byId('result').value=e.result||'';byId('contacts').value=e.contacts||'';byId('sns').value=e.sns||''}
async function saveReport(){let e=find(byId('eid').value);e.result=byId('result').value;e.contacts=byId('contacts').value;e.sns=byId('sns').value;e.status='報告済';save();if(config.gasUrl)await syncEvent(e).catch(console.error);alert('保存しました');detail(e.id)}
function printReport(){let e=find(byId('eid').value);e.result=byId('result').value;e.contacts=byId('contacts').value;e.sns=byId('sns').value;e.status='報告済';save();detail(e.id);setTimeout(()=>window.print(),100)}
function vault(){app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><div class="card"><h2>契約・車両保管庫</h2>${state.vehicles.map(v=>`<div class="card"><b>${esc(v.name)}</b><p class="muted">所有：${esc(v.owner)}<br>移転予定：${esc(v.plan)}<br>契約：${esc(v.contract)}</p></div>`).join('')}</div>`)}
function detail(i){let e=find(i),ex=(e.expenses||[]).reduce((s,x)=>s+Number(x.amount||0),0);app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><h1 class="print-title">MTS合同会社 車両イベント参加・広報活動記録</h1><div class="card"><h2>${esc(e.title)}</h2><p class="muted">日付：${esc(e.date)}<br>車両：${esc(e.vehicle)}<br>場所：${esc(e.place)}<br>目的：${esc(e.purpose)}<br>状態：${esc(e.status)}<br>GAS ID：${esc(e.driveId||'未保存')}</p></div><div class="card"><h3>参加計画</h3><p class="muted">${nl(e.plan)}</p></div><div class="card"><h3>当日メモ</h3><p class="muted">${nl(e.memo)}</p></div><div class="card"><h3>報告</h3><p class="muted">${nl(e.result)}<br>${esc(e.contacts)}<br>${esc(e.sns)}</p></div><div class="card"><h3>経費</h3>${expenseTable(e)}<p class="muted">合計 ${yen(ex)}</p></div><div class="card"><h3>写真・領収書</h3><div class="thumbs">${(e.photos||[]).map(p=>`<div class="thumb"><img src="${p.data}"><span class="pill">${esc(mt[p.mediaType]||'その他')}</span></div>`).join('')}</div></div><div class="card no-print actions"><button class="primary" onclick="syncOne('${e.id}')">GAS同期</button><button class="secondary" onclick="window.print()">PDF出力</button><button class="secondary" onclick="csv(true)">CSV出力・GAS保存</button><button class="danger" onclick="delEvent('${e.id}')">削除</button></div>`)}
function expenseTable(e){return`<table><tr><th>日付</th><th>費目</th><th>金額</th></tr>${(e.expenses||[]).map(x=>`<tr><td>${esc(x.date)}</td><td>${esc(x.name)}</td><td>${yen(x.amount)}</td></tr>`).join('')}</table>`}
function find(i){return state.events.find(e=>e.id===i)}function delEvent(i){if(confirm('削除しますか？')){state.events=state.events.filter(e=>e.id!==i);save();home()}}
async function syncOne(i){try{await syncEvent(find(i));alert('同期しました');detail(i)}catch(e){alert('同期エラー：'+e.message)}}
function syncView(){app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><div class="card"><h2>GAS同期設定</h2><div id="syncStatusBox"></div><div class="notice">GAS WebアプリURLを貼り付けて保存してください。v1.5では写真・領収書をイベント別サブフォルダに分類保存します。</div><div class="field"><label>GAS WebアプリURL</label><input id="gasUrl" value="${esc(config.gasUrl||'')}"></div><button class="secondary" onclick="saveConfig()">設定保存</button><button class="primary" onclick="gasPing()">接続テスト</button><button class="secondary" onclick="syncAllSafe()">全イベント同期</button><button class="secondary" onclick="backupSafe()">バックアップJSON保存</button><p class="muted">最終同期：${esc(state.drive.lastSync||'未同期')}</p></div>`)}
function saveConfig(){config.gasUrl=byId('gasUrl').value.trim();saveCfg();alert('設定を保存しました')}
function requireGas(){if(!config.gasUrl)throw new Error('GAS WebアプリURLを設定してください')}function toBase64(d){return String(d||'').split(',')[1]||''}
async function gasPost(p){requireGas();let r=await fetch(config.gasUrl,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(p)}),t=await r.text(),j;try{j=JSON.parse(t)}catch(e){throw new Error('GAS応答を読めません：'+t.slice(0,400))}if(!j.ok)throw new Error(j.error||JSON.stringify(j));return j}
async function gasPing(){try{syncMsg('接続テスト中...');let r=await gasPost({action:'ping'});syncMsg('接続成功：'+(r.message||'OK'))}catch(e){syncMsg('接続テスト失敗：'+e.message)}}
async function syncEvent(e){let r=await gasPost({action:'saveEvent',date:e.date,title:e.title,event:e});e.driveId=r.fileId;state.drive.lastSync=new Date().toLocaleString('ja-JP');save();return r}
async function uploadData(d,n,m,e){return gasPost({action:'saveMedia',date:e.date,title:e.title,mediaType:m,fileName:n,mimeType:(d.match(/^data:(.*?);base64,/)||[])[1]||'image/jpeg',base64:toBase64(d)})}
async function syncAllSafe(){try{syncMsg('全イベント同期を開始します...');let ok=0,ng=0,mo=0;for(const e of state.events){try{await syncEvent(e);ok++;for(const p of (e.photos||[])){if(!p.gasFileId&&p.data){let r=await uploadData(p.data,`${e.date}_${e.title}_${p.name||'photo.jpg'}`,p.mediaType||'other',e).catch(err=>null);if(r){p.gasFileId=r.fileId;mo++;save()}}}syncMsg(`同期中：イベント ${ok}/${state.events.length} 写真 ${mo}`)}catch(err){ng++}}state.drive.lastSync=new Date().toLocaleString('ja-JP');save();syncMsg(`同期完了：成功 ${ok} 件 / 失敗 ${ng} 件 / 写真 ${mo} 件`)}catch(e){syncMsg('同期エラー：'+e.message)}}
async function backupSafe(){try{await gasPost({action:'backup',fileName:'MTS_vehicle_log_backup_'+today()+'.json',payload:state});syncMsg('バックアップ完了')}catch(e){syncMsg('バックアップエラー：'+e.message)}}
function csv(up=false){let rows=[['日付','イベント名','車両','費目','金額','目的','SNS']];state.events.forEach(e=>(e.expenses||[]).forEach(x=>rows.push([x.date,e.title,e.vehicle,x.name,x.amount,e.purpose,e.sns||''])));let text=rows.map(r=>r.map(v=>`"${String(v||'').replaceAll('"','""')}"`).join(',')).join('\n'),b=new Blob(['\ufeff'+text],{type:'text/csv'});downloadBlob(b,'MTS_vehicle_expenses.csv');if(up&&config.gasUrl)gasPost({action:'saveCsv',fileName:'MTS_vehicle_expenses_'+today()+'.csv',csv:text}).then(()=>alert('CSVをGAS保存しました')).catch(e=>alert('CSV保存失敗：'+e.message))}
function downloadBlob(b,n){let a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=n;a.click();URL.revokeObjectURL(a.href)}
function manual(){app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><div class="card manual"><h2>簡易マニュアル</h2><h3>基本の使い方</h3><ol><li><b>計画</b>でイベント名・日付・車両・目的を入力。</li><li><b>記録</b>で写真分類を選び、写真・領収書・SNSスクショを追加。</li><li>経費を入力し、<b>記録保存・GAS同期</b>を押す。</li><li><b>報告</b>で得られた内容・交流先・SNS URLを入力。</li><li><b>同期</b>で全イベント同期やバックアップを実行。</li></ol><h3>Drive保存先</h3><ul><li>MTS Vehicle Log / 01_イベント記録</li><li>MTS Vehicle Log / 02_写真・領収書 / 日付_イベント名 / 分類</li><li>MTS Vehicle Log / 04_経費CSV</li><li>MTS Vehicle Log / 99_バックアップ</li></ul><h3>分類</h3><ul><li>会場写真：イベント会場</li><li>車両写真：展示・車両状態</li><li>領収書：高速代・燃料・駐車場</li><li>SNSスクショ：投稿・ストーリー</li><li>名刺・交流：交流先・商談</li></ul><h3>税務証拠のコツ</h3><ul><li>イベント前に目的を書く</li><li>当日は写真・領収書を残す</li><li>帰宅後に報告とSNS URLを入れる</li><li>月末にCSVを保存する</li></ul></div>`)}
render()
</script></body></html>
