<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MTS Vehicle Log v1.2</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js" async defer></script>
<style>
body{margin:0;background:#f4f4f5;color:#18181b;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif}
*{box-sizing:border-box}button,input,textarea,select{font:inherit}.app{max-width:540px;margin:auto;padding:16px 16px 96px}.hero{background:linear-gradient(135deg,#09090b,#3f3f46);color:white;border-radius:28px;padding:22px;box-shadow:0 18px 45px rgba(0,0,0,.16)}h1{margin:0;font-size:25px}.hero p{color:#d4d4d8;margin:6px 0 0}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}.stats div{background:rgba(255,255,255,.1);border-radius:16px;text-align:center;padding:10px}.stats b{display:block;font-size:16px}.stats span{font-size:11px;color:#d4d4d8}.sync{margin-top:14px;background:rgba(255,255,255,.1);border-radius:16px;padding:10px;font-size:12px;color:#e4e4e7}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}.tile{border:0;background:white;border-radius:24px;padding:18px;text-align:left;box-shadow:0 4px 18px rgba(0,0,0,.05)}.tile b{display:block}.tile small{display:block;color:#71717a;line-height:1.6;margin-top:4px}.card{background:white;border-radius:24px;padding:16px;margin:12px 0;box-shadow:0 4px 18px rgba(0,0,0,.05)}.muted{font-size:12px;color:#71717a;line-height:1.7}.pill{display:inline-block;background:#f4f4f5;color:#52525b;border-radius:999px;padding:5px 10px;font-size:11px;margin:3px}.ok{background:#dcfce7;color:#166534}.warn{background:#fef3c7;color:#92400e}.field label{display:block;font-size:12px;color:#52525b;font-weight:700;margin:10px 0 5px}input,textarea,select{width:100%;border:1px solid #ddd;border-radius:14px;padding:12px;background:white}textarea{min-height:100px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.primary{border:0;background:#18181b;color:white;border-radius:18px;padding:14px;font-weight:700;text-align:center}.secondary{border:1px solid #d4d4d8;background:white;border-radius:18px;padding:12px;text-align:center}.danger{border:0;background:#fee2e2;color:#991b1b;border-radius:18px;padding:12px;text-align:center}.actions{display:grid;gap:10px;margin-top:12px}.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);padding:10px;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.nav button{text-align:center;padding:9px 4px;border-radius:16px;border:0;background:transparent;color:#71717a;font-size:12px}.nav button.active{background:#18181b;color:white}.upload{border:2px dashed #d4d4d8;background:#fafafa;border-radius:22px;padding:16px;text-align:center}.thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.thumb img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px}.notice{background:#eef2ff;color:#3730a3;border:1px solid #c7d2fe;border-radius:18px;padding:12px;font-size:12px;line-height:1.7}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #eee;padding:8px;font-size:12px;text-align:left}.print-title{display:none}@media print{.nav,.no-print,.hero{display:none}.app{max-width:none;padding:0}.card{box-shadow:none;border:1px solid #ccc;border-radius:0;break-inside:avoid}.print-title{display:block}}
</style>
</head>
<body>
<div id="app"></div>
<script>
const CONFIG_KEY='mts_vehicle_log_config_v1';
const DATA_KEY='mts_vehicle_log_v1';
const SCOPES='https://www.googleapis.com/auth/drive.file';
let config=JSON.parse(localStorage.getItem(CONFIG_KEY)||'{"clientId":"","root":"MTS Vehicle Log"}');
let state=JSON.parse(localStorage.getItem(DATA_KEY)||'{"events":[],"vehicles":[{"name":"TVR Sagaris","owner":"個人所有","plan":"MTSへ所有権移転予定","contract":"使用貸借契約あり"},{"name":"Ferrari F430 Spider","owner":"個人所有","plan":"未定","contract":"未設定"}],"drive":{"folders":{},"lastSync":""}}');
let tokenClient=null, accessToken=null, current='home';
const folders={events:"01_イベント記録",media:"02_写真・領収書",pdf:"03_PDF報告書",csv:"04_経費CSV",docs:"05_契約書・規程",backup:"99_バックアップ"};
function save(){localStorage.setItem(DATA_KEY,JSON.stringify(state))}
function saveCfg(){localStorage.setItem(CONFIG_KEY,JSON.stringify(config))}
function yen(n){return'¥'+Number(n||0).toLocaleString()}function today(){return new Date().toISOString().slice(0,10)}function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function nl(s){return esc(s||'').replaceAll('\\n','<br>')}
function byId(x){return document.getElementById(x)}
function msg(t){let el=byId('statusMsg'); if(el) el.innerHTML='<div class="notice">'+esc(t)+'</div>'; else alert(t)}
function app(h){document.getElementById('app').innerHTML='<main class="app">'+h+'</main>'+nav()}
function nav(){return`<div class="nav no-print">${[['new','計画'],['record','記録'],['report','報告'],['vault','保管'],['sync','同期']].map(([v,l])=>`<button class="${current===v?'active':''}" onclick="render('${v}')">${l}</button>`).join('')}</div>`}
function render(v='home'){current=v;if(v==='home')home();if(v==='new')newEvent();if(v==='record')record();if(v==='report')report();if(v==='vault')vault();if(v==='sync')syncView();if(v.startsWith('detail:'))detail(v.split(':')[1])}
function totals(){return{exp:state.events.reduce((s,e)=>s+(e.expenses||[]).reduce((a,x)=>a+Number(x.amount||0),0),0),media:state.events.reduce((s,e)=>s+(e.photos||[]).length,0)}}
function home(){let t=totals();app(`<section class="hero"><h1>MTS Vehicle Log v1.2</h1><p>車両イベント・広報活動の証拠保管</p><div class="stats"><div><b>${state.events.length}</b><span>記録数</span></div><div><b>${t.media}</b><span>写真/領収書</span></div><div><b>${yen(t.exp)}</b><span>経費候補</span></div></div><div class="sync">Drive：${accessToken?'接続中':'未接続'} / 最終同期：${esc(state.drive.lastSync||'未同期')}</div></section><section class="grid no-print"><button class="tile" onclick="render('new')"><b>＋ 新規イベント</b><small>参加計画を作成</small></button><button class="tile" onclick="render('record')"><b>📷 当日記録</b><small>写真・領収書・経費</small></button><button class="tile" onclick="render('report')"><b>✓ 完了・報告</b><small>PDF/CSV/Drive保存</small></button><button class="tile" onclick="render('sync')"><b>⇄ Drive同期</b><small>Google Driveへバックアップ</small></button></section><div class="card"><b>最近の記録</b></div>${state.events.length?state.events.slice().reverse().map(e=>`<div class="card" onclick="render('detail:${e.id}')"><b>${esc(e.title)}</b><br><span class="muted">${esc(e.date)} / ${esc(e.vehicle)} / ${esc(e.status||'計画')}</span><br>${e.driveId?'<span class="pill ok">Drive保存済</span>':'<span class="pill warn">未同期</span>'}</div>`).join(''):'<div class="card muted">まだ記録がありません。</div>'}`)}
function newEvent(){app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><div class="card"><h2>新規イベント</h2><div class="field"><label>イベント名</label><input id="title" placeholder="GT / オーナーズイベント参加"></div><div class="row"><div class="field"><label>日付</label><input id="date" type="date" value="${today()}"></div><div class="field"><label>使用車両</label><input id="vehicle" placeholder="TVR Sagaris"></div></div><div class="field"><label>場所</label><input id="place"></div><div class="field"><label>目的</label><input id="purpose" placeholder="SNS広報、撮影、交流"></div><div class="field"><label>目的・予定メモ</label><textarea id="plan"></textarea></div><button class="primary" onclick="saveNew()">保存</button></div>`)}
async function saveNew(){let e={id:id(),title:title.value,date:date.value,vehicle:vehicle.value,place:place.value,purpose:purpose.value,status:'計画',plan:plan.value,memo:'',result:'',contacts:'',sns:'',expenses:[],photos:[],createdAt:new Date().toISOString()};state.events.push(e);save();if(accessToken)await syncEvent(e);detail(e.id)}
function pick(){return state.events.map(e=>`<option value="${e.id}">${esc(e.date)} / ${esc(e.title)}</option>`).join('')}
function record(){app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><div class="card"><h2>当日記録</h2><div id="statusMsg"></div>${state.events.length?`<div class="field"><label>対象イベント</label><select id="eid">${pick()}</select></div><div class="upload"><b>写真・領収書・SNSスクショ</b><p class="muted">複数選択できます。写真なしでも保存できます。</p><input id="photos" type="file" accept="image/*" multiple></div><div class="field"><label>当日メモ</label><textarea id="memo"></textarea></div><div class="row"><div class="field"><label>費目</label><input id="ename" placeholder="高速代"></div><div class="field"><label>金額</label><input id="amount" type="number"></div></div><button class="secondary" onclick="addExpense()">経費追加</button><button class="primary" onclick="saveRecord()">記録保存・Drive同期</button>`:'先にイベントを作成してください。'}</div>`)}
function addExpense(){try{let e=find(byId('eid').value);let amountVal=Number(byId('amount').value||0);if(amountVal>0){e.expenses.push({name:byId('ename').value||'経費',amount:amountVal,date:today()});e.status='記録中';save();msg('経費を追加しました')}else{msg('金額を入力してください')}}catch(err){console.error(err);msg('経費追加でエラー：'+err.message)}}
function fileData(f){return new Promise(r=>{let fr=new FileReader();fr.onload=()=>r(fr.result);fr.readAsDataURL(f)})}
async function saveRecord(){try{msg('保存中です...');let e=find(byId('eid').value);if(!e){msg('対象イベントが見つかりません');return}e.memo=byId('memo').value;e.status='記録中';let fileInput=byId('photos');let files=fileInput&&fileInput.files?Array.from(fileInput.files):[];for(const f of files){let data=await fileData(f), item={name:f.name,type:f.type,data,addedAt:new Date().toISOString()};if(accessToken){let up=await uploadData(data,`${e.date}_${e.title}_${f.name}`,folders.media).catch(err=>{console.error(err);return null}); if(up)item.driveId=up.id}e.photos.push(item)}save();if(accessToken){await syncEvent(e).catch(err=>{console.error(err);msg('ローカル保存は完了。Drive同期は失敗：'+err.message);return null})}msg('保存しました');setTimeout(()=>detail(e.id),500)}catch(err){console.error(err);msg('記録保存でエラー：'+err.message)}}
function report(){app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><div class="card"><h2>完了・報告</h2>${state.events.length?`<div class="field"><label>対象イベント</label><select id="eid">${pick()}</select></div><div class="field"><label>得られた内容・業務への活用</label><textarea id="result"></textarea></div><div class="field"><label>交流先</label><input id="contacts"></div><div class="field"><label>SNS URL</label><input id="sns"></div><div class="actions"><button class="primary" onclick="saveReport()">報告保存・Drive同期</button><button class="secondary" onclick="printReport()">PDF出力</button><button class="secondary" onclick="csv(true)">CSV出力・Drive保存</button></div>`:'先にイベントを作成してください。'}</div>`);if(state.events.length){eid.onchange=fillReport;fillReport()}}
function fillReport(){let e=find(byId('eid').value);byId('result').value=e.result||'';byId('contacts').value=e.contacts||'';byId('sns').value=e.sns||''}
async function saveReport(){try{let e=find(byId('eid').value);e.result=byId('result').value;e.contacts=byId('contacts').value;e.sns=byId('sns').value;e.status='報告済';save();if(accessToken)await syncEvent(e).catch(console.error);alert('保存しました');detail(e.id)}catch(err){console.error(err);alert('報告保存でエラー：'+err.message)}}
function printReport(){let e=find(byId('eid').value);e.result=byId('result').value;e.contacts=byId('contacts').value;e.sns=byId('sns').value;e.status='報告済';save();detail(e.id);setTimeout(()=>window.print(),100)}
function vault(){app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><div class="card"><h2>契約・車両保管庫</h2>${state.vehicles.map((v,i)=>`<div class="card"><b>${esc(v.name)}</b><p class="muted">所有：${esc(v.owner)}<br>移転予定：${esc(v.plan)}<br>契約：${esc(v.contract)}</p></div>`).join('')}<h3>書類</h3><p class="muted">車両使用貸借契約書：作成済み<br>イベント記録書：作成済み<br>MTS車両・イベント参加規程：未作成</p></div><div class="card no-print"><h3>車両追加</h3><input id="vname" placeholder="車両名"><input id="vowner" placeholder="所有者"><input id="vplan" placeholder="移転予定"><button class="primary" onclick="addVehicle()">追加</button></div>`)}
function addVehicle(){if(!vname.value)return;state.vehicles.push({name:vname.value,owner:vowner.value,plan:vplan.value,contract:'未設定'});save();vault()}
function detail(i){let e=find(i);let ex=(e.expenses||[]).reduce((s,x)=>s+Number(x.amount||0),0);app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><h1 class="print-title">MTS合同会社 車両イベント参加・広報活動記録</h1><div class="card"><h2>${esc(e.title)}</h2><p class="muted">日付：${esc(e.date)}<br>車両：${esc(e.vehicle)}<br>場所：${esc(e.place)}<br>目的：${esc(e.purpose)}<br>状態：${esc(e.status)}<br>Drive ID：${esc(e.driveId||'未保存')}</p></div><div class="card"><h3>参加計画</h3><p class="muted">${nl(e.plan)}</p></div><div class="card"><h3>当日メモ</h3><p class="muted">${nl(e.memo)}</p></div><div class="card"><h3>報告</h3><p class="muted">${nl(e.result)}<br>${esc(e.contacts)}<br>${esc(e.sns)}</p></div><div class="card"><h3>経費</h3>${expenseTable(e)}<p class="muted">合計 ${yen(ex)}</p></div><div class="card"><h3>写真・領収書</h3><div class="thumbs">${(e.photos||[]).map(p=>`<div class="thumb"><img src="${p.data}"></div>`).join('')}</div></div><div class="card no-print actions"><button class="primary" onclick="syncOne('${e.id}')">Drive同期</button><button class="secondary" onclick="window.print()">PDF出力</button><button class="secondary" onclick="csv(true)">CSV出力・Drive保存</button><button class="danger" onclick="delEvent('${e.id}')">削除</button></div>`)}
function expenseTable(e){return`<table><tr><th>日付</th><th>費目</th><th>金額</th></tr>${(e.expenses||[]).map(x=>`<tr><td>${esc(x.date)}</td><td>${esc(x.name)}</td><td>${yen(x.amount)}</td></tr>`).join('')}</table>`}
function find(i){return state.events.find(e=>e.id===i)}function delEvent(i){if(confirm('削除しますか？')){state.events=state.events.filter(e=>e.id!==i);save();home()}}
async function syncOne(i){if(!accessToken){alert('先に同期画面でGoogleログインしてください');return}await syncEvent(find(i));alert('同期しました');detail(i)}
function csv(downloadAndDrive=false){let rows=[['日付','イベント名','車両','費目','金額','目的','SNS']];state.events.forEach(e=>(e.expenses||[]).forEach(x=>rows.push([x.date,e.title,e.vehicle,x.name,x.amount,e.purpose,e.sns||''])));let text=rows.map(r=>r.map(v=>`"${String(v||'').replaceAll('"','""')}"`).join(',')).join('\\n');let blob=new Blob(['\\ufeff'+text],{type:'text/csv'});downloadBlob(blob,'MTS_vehicle_expenses.csv');if(downloadAndDrive&&accessToken)uploadBlob(blob,'MTS_vehicle_expenses_'+today()+'.csv','text/csv',folders.csv).then(()=>alert('CSVをDrive保存しました')).catch(()=>alert('Drive保存に失敗しました'))}
function downloadBlob(blob,name){let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}
function syncView(){app(`<button class="secondary no-print" onclick="render('home')">← ホーム</button><div class="card"><h2>Drive同期設定</h2><div id="syncStatusBox"></div><div class="notice">Google Drive同期にはOAuth Client IDが必要です。設定後、Googleログイン→Driveフォルダ確認→全同期の順で使います。</div><div class="field"><label>Google OAuth Client ID</label><input id="clientId" value="${esc(config.clientId)}" placeholder="xxxxx.apps.googleusercontent.com"></div><div class="field"><label>Driveルートフォルダ</label><input id="root" value="${esc(config.root)}"></div><button class="secondary" onclick="saveConfig()">設定保存</button><button class="primary" onclick="auth()">Googleでログイン</button><button class="secondary" onclick="setupDriveSafe()">Driveフォルダ確認・作成</button><button class="secondary" onclick="syncAllSafe()">全イベント同期</button><button class="secondary" onclick="backupSafe()">バックアップJSON保存</button><p class="muted">状態：${accessToken?'Drive接続中':'未接続'}<br>最終同期：${esc(state.drive.lastSync||'未同期')}</p></div>`)}

function syncMsg(t){let el=byId('syncStatusBox'); if(el) el.innerHTML='<div class="notice">'+esc(t)+'</div>'; else alert(t)}
async function setupDriveSafe(){try{syncMsg('Driveフォルダを確認中です...'); if(!accessToken){syncMsg('先にGoogleでログインしてください'); return} await ensureFolders(); syncMsg('Driveフォルダ確認完了'); setTimeout(()=>render('sync'),700)}catch(err){console.error(err); syncMsg('Driveフォルダ確認エラー：'+err.message)}}
async function syncAllSafe(){try{syncMsg('全イベント同期を開始します...'); if(!accessToken){syncMsg('先にGoogleでログインしてください'); return} await ensureFolders(); if(!state.events.length){syncMsg('同期するイベントがありません。先に新規イベントを作成してください'); return} let ok=0, ng=0; for(const e of state.events){try{await syncEvent(e); ok++; syncMsg('同期中：'+ok+' / '+state.events.length)}catch(err){console.error(err); ng++;}} state.drive.lastSync=new Date().toLocaleString('ja-JP'); save(); syncMsg('同期完了：成功 '+ok+' 件 / 失敗 '+ng+' 件'); setTimeout(()=>render('sync'),1200)}catch(err){console.error(err); syncMsg('全イベント同期エラー：'+err.message)}}
async function backupSafe(){try{syncMsg('バックアップ作成中...'); await backup(); syncMsg('バックアップ完了')}catch(err){console.error(err); syncMsg('バックアップエラー：'+err.message)}}

function saveConfig(){config.clientId=clientId.value.trim();config.root=root.value.trim()||'MTS Vehicle Log';saveCfg();alert('設定を保存しました')}
window.onload=()=>{let a=setInterval(()=>{if(window.gapi){clearInterval(a);gapi.load('client',async()=>{await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']})})}},200)}
function initToken(){if(!config.clientId){alert('Client IDを設定してください');return false}tokenClient=google.accounts.oauth2.initTokenClient({client_id:config.clientId,scope:SCOPES,callback:async r=>{if(r.error){alert('認証エラー');return}accessToken=r.access_token;await ensureFolders();render('sync')}});return true}
function auth(){saveConfig();if(!window.google?.accounts?.oauth2){alert('Google認証ライブラリを読み込み中です。少し待って再度押してください');return}if(!tokenClient&&!initToken())return;tokenClient.requestAccessToken({prompt:'consent'})}
async function setupDrive(){if(!accessToken){alert('先にGoogleログインしてください');return}await ensureFolders();alert('Driveフォルダ確認完了');render('sync')}
async function ensureFolders(){let root=await findOrCreateFolder(config.root,null);state.drive.rootId=root.id;state.drive.folders=state.drive.folders||{};for(let k of Object.keys(folders)){let f=await findOrCreateFolder(folders[k],root.id);state.drive.folders[folders[k]]=f.id}state.drive.lastSync=new Date().toLocaleString('ja-JP');save()}
async function findOrCreateFolder(name,parentId){let q=[`mimeType='application/vnd.google-apps.folder'`,`name='${name.replaceAll("'","\\\\'")}'`,`trashed=false`];if(parentId)q.push(`'${parentId}' in parents`);let res=await gapi.client.drive.files.list({q:q.join(' and '),fields:'files(id,name)',spaces:'drive'});if(res.result.files&&res.result.files.length)return res.result.files[0];let meta={name,mimeType:'application/vnd.google-apps.folder'};if(parentId)meta.parents=[parentId];let cr=await gapi.client.drive.files.create({resource:meta,fields:'id,name'});return cr.result}
async function syncEvent(e){await ensureFolders();let blob=new Blob([JSON.stringify(e,null,2)],{type:'application/json'});let up=await uploadBlob(blob,safe(`${e.date}_${e.title}.json`),'application/json',folders.events,e.driveId);e.driveId=up.id;state.drive.lastSync=new Date().toLocaleString('ja-JP');save();return up}
async function syncAll(){return syncAllSafe()}
async function backup(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});downloadBlob(blob,'MTS_vehicle_log_backup.json');if(accessToken){await uploadBlob(blob,'MTS_vehicle_log_backup_'+today()+'.json','application/json',folders.backup);alert('Driveにも保存しました')}}
function safe(s){return String(s||'file').replace(/[\\\\/:*?"<>|#%{}~&]/g,'_').slice(0,160)}
function dataBlob(dataUrl){let [m,b64]=dataUrl.split(','),mime=(m.match(/data:(.*);base64/)||[])[1]||'application/octet-stream',bin=atob(b64),arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mime})}
async function uploadData(dataUrl,name,folder){let blob=dataBlob(dataUrl);return uploadBlob(blob,safe(name),blob.type,folder)}
async function uploadBlob(blob,name,mime,folder,fileId){if(!state.drive.rootId || !state.drive.folders || !state.drive.folders[folder]){await ensureFolders()}let folderId=state.drive.folders[folder]||state.drive.rootId,meta={name,mimeType:mime};if(!fileId)meta.parents=[folderId];let boundary='mts_'+Date.now(),body=new Blob(['\\r\\n--'+boundary+'\\r\\nContent-Type: application/json; charset=UTF-8\\r\\n\\r\\n'+JSON.stringify(meta),'\\r\\n--'+boundary+'\\r\\nContent-Type: '+mime+'\\r\\n\\r\\n',blob,'\\r\\n--'+boundary+'--'],{type:'multipart/related; boundary='+boundary});let url=fileId?`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=multipart&fields=id,name,webViewLink`:'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,webViewLink';let res=await fetch(url,{method:fileId?'PATCH':'POST',headers:{Authorization:'Bearer '+accessToken},body});if(!res.ok)throw new Error(await res.text());return res.json()}
